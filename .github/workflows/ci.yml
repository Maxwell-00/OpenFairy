name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm (version from root package.json "packageManager")
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Pre-pull sandbox image (moves cold-start out of test timeouts)
        if: runner.os == 'Linux'
        run: docker pull node:22-slim
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Dependency rules
        run: pnpm dep-check

  python-311-speech:
    name: Python 3.11 speech floor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm (version from root package.json "packageManager")
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - id: python
        name: Provision Python 3.11 floor
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: M3-05 MiniMax TTS provider conformance on Python 3.11
        env:
          FAIRY_TEST_PYTHON: ${{ steps.python.outputs.python-path }}
        run: pnpm --filter @fairy/testing test:voice-tts-provider
      - name: R0.9-01 MiMo ASR provider conformance on Python 3.11
        env:
          FAIRY_TEST_PYTHON: ${{ steps.python.outputs.python-path }}
        run: pnpm --filter @fairy/testing test:voice-mimo-asr-provider
      - name: R0.9-02 Web PTT end-to-end on Python 3.11
        env:
          FAIRY_TEST_PYTHON: ${{ steps.python.outputs.python-path }}
        run: pnpm --filter @fairy/testing test:voice-web-ptt
