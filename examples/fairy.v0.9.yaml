# OpenFairy v0.9 Developer Preview example.
# Copy this file to the user config location, then replace model identifiers and
# set the referenced environment variables. Never put credential values here.
models:
  - id: main-openai-compatible
    transport: openai-chat
    # Placeholder only; example.invalid is intentionally not a usable endpoint.
    base_url: https://example.invalid/v1
    model: replace-with-openai-compatible-model
    api_key_ref: secret://main_model_api_key
    capabilities:
      tools: native
      context_window: 128000
      max_output: 4096
    data_clearance:
      max_sensitivity: personal
      residency: [region-restricted, global-ok]
      regions: [cn]

roles:
  main:
    model: main-openai-compatible
    fallback: []

gateway:
  port: 8787
  auth:
    token: secret://gateway_token

governance:
  profile: balanced
  home_regions: [cn]

voice:
  enabled: true
  transport: loopback
  loopback:
    tts_chunk_chars: 80

speech:
  providers:
    - id: mimo-asr-paygo-cn
      stage: asr
      transport: mimo-v2.5-asr-chat-http
      endpoint_profile: mimo-paygo-cn
      model: mimo-v2.5-asr
      api_key_ref: secret://mimo_asr_paygo
      language: auto
      limits:
        max_input_bytes: 7000000
        max_response_bytes: 1048576
        max_transcript_chars: 20000
      data_clearance:
        max_sensitivity: personal
        residency: [region-restricted, global-ok]
        regions: [cn]
    - id: minimax-tts-cn
      stage: tts
      transport: minimax-t2a-v2-http
      endpoint_profile: cn-primary
      model: speech-2.8-turbo
      voice:
        # Replace with a voice ID available to the configured MiniMax account.
        voice_id: replace-with-minimax-voice-id
        speed: 1
        volume: 1
        pitch: 0
      api_key_ref: secret://minimax_t2a_token
      language_boost: auto
      audio:
        format: mp3
        sample_rate: 32000
        bitrate: 128000
        channel: 1
      limits:
        max_text_chars: 3000
        max_response_bytes: 67108864
        max_audio_bytes: 33554432
      data_clearance:
        max_sensitivity: personal
        residency: [region-restricted, global-ok]
        regions: [cn]
  roles:
    asr:
      primary: mimo-asr-paygo-cn
      fallback: []
    tts:
      primary: minimax-tts-cn
      fallback: []

# Deterministic/mock research remains available without public-provider traffic.
search:
  engine:
    kind: mock
