models: []
roles: {}
gateway:
  port: 8787
  watchdog_s: 60
  auth:
    token: dev-token
kernel:
  system_prompt: "You are Fairy, a helpful bilingual (Chinese/English) AI companion. Be concise, capable, and honest."
  max_tool_iterations: 16
permissions:
  ask_timeout_s: 300
  rules:
    - tool: "fs.*"
      decision: allow
    - tool: "shell.run"
      decision: ask
    - tool: "web.*"
      decision: allow
    - tool: "research.*"
      decision: allow
    - tool: "vision.*"
      decision: allow
    - tool: "chronicle.*"
      decision: allow
    - tool: "*"
      decision: ask
context:
  reduce_at: 0.8
  min_recent_turns: 4
  memory_digest_budget: 600
  l4_placeholder_threshold: 6
  l4_target_tokens: 800
  l5_target_tokens: 1200
  compaction_role: summarizer
chronicle:
  enabled: true
  digest_budget: 500
  max_results: 6
  storage: data-dir
memory:
  consolidation:
    enabled: true
    learned_skill_pending_dir: extensions/skills/learned/pending
persona:
  id: fairy
  enabled: true
  root: extensions/personas
affect:
  enabled: true
voice:
  enabled: true
  transport: loopback
  loopback:
    tts_chunk_chars: 80
search:
  engine:
    kind: mock
governance:
  profile: balanced
  home_regions: [cn]
  egress:
    external_tools: ["web.*", "shell.run"]
    personal_allowed_tools: []
  categories:
    credentials:
      sensitivity: secret
      residency: local-only
      patterns: []
    health:
      sensitivity: personal
      residency: local-only
      patterns: []
    finance:
      sensitivity: personal
      residency: local-only
      patterns: []
    relationship:
      sensitivity: personal
      patterns: []
    workplace:
      sensitivity: internal
      patterns: []
    legal:
      sensitivity: personal
      residency: local-only
      patterns: []
research:
  engines: []
  budgets:
    default:
      searches: 12
      fetches: 20
    deep:
      searches: 40
      fetches: 60
  domains:
    deny: []
    prefer_primary: []
    grade_overrides: {}
  snapshots:
    ttl: 7d
    max_store: 5GB
    evict: LRU
sandbox:
  image: node:22-slim
  default_profile: safe
  timeout_s: 120
  profiles:
    safe:
      network: none
      filesystem: workspace
    dev:
      network: allowlist
      filesystem: workspace
    trusted:
      network: full
      filesystem: declared-host-paths
